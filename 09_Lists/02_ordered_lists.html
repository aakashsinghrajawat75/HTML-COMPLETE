<!DOCTYPE html>
<html>
<head>
    <title>Ordered Lists</title>
</head>
<body>
    <h1>Numbered Sequences</h1>

    <p>Use the <b>ol</b> (Ordered List) tag when the sequence or ranking matters.</p>

    <h2>Top Performers</h2>
    <!-- The <ol> wrapper defines a numbered list -->
    <ol>
        <li>Khushi (CGPA: 9.2)</li>
        <li>Aakash (CGPA: 9.0)</li>
        <li>Gagan (CGPA: 8.8)</li>
    </ol>

    <p><small>Jay compiled this ranking.</small></p>

</body>
</html>
