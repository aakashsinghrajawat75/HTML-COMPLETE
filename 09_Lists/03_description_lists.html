<!DOCTYPE html>
<html>
<head>
    <title>Description Lists</title>
</head>
<body>
    <h1>Glossary style lists</h1>

    <p>A description list is a list of terms, with a description or definition for each term. Kunal programmed this directory.</p>

    <!-- The <dl> wrapper defines a description list -->
    <dl>
        <!-- The <dt> tags define the TERM -->
        <!-- The <dd> tags define the DESCRIPTION -->
        
        <dt>Aakash</dt>
        <dd>- Head of the Tech Blog</dd>
        
        <dt>Daulat</dt>
        <dd>- Event Coordinator</dd>
        
        <dt>Deepanshu</dt>
        <dd>- Lead Software Engineer</dd>
    </dl>

</body>
</html>
