<!DOCTYPE html>
<html>
<head>
    <title>Unordered Lists</title>
</head>
<body>
    <h1>Bullet Points</h1>

    <p>Use the <b>ul</b> (Unordered List) tag when the order of the items does not matter.</p>

    <!-- The <ul> wrapper defines the type of list -->
    <ul>
        <!-- The <li> elements are the actual listed items -->
        <li>Aakash</li>
        <li>Charv</li>
        <li>Daulat</li>
    </ul>

    <p>Khushi noted that you can change the style of the bullets (squares, circles, none) later using CSS!</p>

</body>
</html>
