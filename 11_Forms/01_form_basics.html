<!DOCTYPE html>
<html>
<head>
    <title>Basic Inputs</title>
</head>
<body>
    <h1>Standard Form Elements</h1>

    <p>Aakash programmed this basic registration box!</p>

    <form action="#">
        <!-- Text Input -->
        <label for="fname">First Name:</label><br>
        <input type="text" id="fname" name="fname" value="Aakash" required><br><br>

        <!-- Email Input (Validates for an @ symbol) -->
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" value="aakash.9.0@example.com" required><br><br>

        <!-- Password Input (Hides the text with dots) -->
        <label for="pwd">Password:</label><br>
        <input type="password" id="pwd" name="pwd" required><br><br>
        
        <button type="submit">Submit</button>
    </form>

</body>
</html>
