<!DOCTYPE html>
<html>
<head>
    <title>Images as Links</title>
</head>
<body>
    <h1>Clickable Images</h1>

    <p>Jay discovered a neat trick: You can place an <code>&lt;img&gt;</code> tag completely inside an <code>&lt;a&gt;</code> tag. This turns the entire image into a clickable button!</p>

    <!-- The image is nested completely inside the anchor tag -->
    <a href="https://github.com/aakash">
        <img src="Garo.jpeg" 
             alt="A button prompting you to click and visit Aakash's profile"
             style="border: 2px solid black;">
    </a>

    <p>Kunal added the black border using inline styles just to make it look pop out more.</p>

</body>
</html>
