<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Elements</title>
</head>
<body>
    <h1>This is a heading element</h1>
    <p>This is a paragraph element.</p>
    <p>This paragraph contains a <br> line break element (an empty element).</p>
    <hr> <!-- This is a horizontal rule, another empty element -->
    <div>
        <p>This is a nested paragraph inside a div element.</p>
    </div>
</body>
</html>
