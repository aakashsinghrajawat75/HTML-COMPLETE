<!DOCTYPE html>
<html>
<head>
    <title>Nested Elements (Basics)</title>
</head>
<body>
    <h1>HTML Element Nesting</h1>
    
    <p>HTML elements can be placed inside other HTML elements. This is called nesting.</p>

    <!-- Example of basic nesting (div -> p -> b) -->
    <div>
        <p>This paragraph is an element <b>nested</b> inside a division element.</p>
        <p>Notice how we always close the inside tags before closing the outside tags. This is a very important rule!</p>
    </div>

    <p><small>Created by Aakash.</small></p>
</body>
</html>
