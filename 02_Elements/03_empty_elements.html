<!DOCTYPE html>
<html>
<head>
    <title>Empty Elements (Basics)</title>
</head>
<body>
    <h1>HTML Empty (Void) Elements</h1>
    
    <p>Some HTML elements have no content. These are called empty elements.</p>
    <p>Empty elements do not have an end tag!</p>

    <!-- The <hr> element creates a horizontal line -->
    <hr>

    <p>This is a paragraph with a <br> line break inside of it.</p>
    <p>Notice how both the &lt;hr&gt; and the &lt;br&gt; tags stand completely on their own.</p>

    <hr>
    <p><small>Created by Charv.</small></p>
</body>
</html>
