<!DOCTYPE html>
<html>
<head>
    <title>The HREF Attribute</title>
</head>
<body>
    <h1>Learning Links using HREF</h1>

    <p>The <code>&lt;a&gt;</code> tag defines a hyperlink. The link address is specified in the <b>href</b> attribute.</p>

    <!-- Example of an absolute URL -->
    <a href="https://www.google.com">Visit Google to Search</a>
    <br><br>

    <!-- Example using our requested names! -->
    <p>Check out <a href="https://github.com/aakash">Aakash's Profile (CGPA: 9.0)</a> for amazing projects!</p>

    <p><small>Tutorial drafted by Kunal.</small></p>
</body>
</html>
