<!DOCTYPE html>
<html>
<head>
    <title>Colors in HTML</title>
</head>
<!-- Applying a background color to the entire body! -->
<body style="background-color: lightcyan;">

    <h1>Styling Colors</h1>

    <!-- Changing Text Color -->
    <h2 style="color: darkblue;">Text Color (Foreground)</h2>
    <p style="color: red;">Aakash (CGPA: 9.0) loves writing in red ink.</p>
    <p style="color: green;">Khushi prefers green text.</p>

    <!-- Changing Background Color -->
    <h2 style="color: darkblue;">Background Color</h2>
    <p style="background-color: yellow;">You can highlight an entire paragraph block using background-color!</p>
    <p style="background-color: black; color: white;">Jay made this paragraph look like a hacker terminal.</p>

</body>
</html>
