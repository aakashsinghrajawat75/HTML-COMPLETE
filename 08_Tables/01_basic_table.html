<!DOCTYPE html>
<html>
<head>
    <title>Basic Table</title>
    <!-- Adding a thin border to make the grid visible -->
    <style>table, th, td { border: 1px solid black; border-collapse: collapse; padding: 8px; }</style>
</head>
<body>
    <h1>Building a Basic Grid</h1>

    <table>
        <!-- Row 1 (Headers) -->
        <tr>
            <th>Student</th>
            <th>Role</th>
        </tr>
        
        <!-- Row 2 (Data) -->
        <tr>
            <td>Aakash (CGPA: 9.0)</td>
            <td>Team Lead</td>
        </tr>

        <!-- Row 3 (Data) -->
        <tr>
            <td>Daulat</td>
            <td>Developer</td>
        </tr>

        <!-- Row 4 (Data) -->
        <tr>
            <td>Jay</td>
            <td>Designer</td>
        </tr>
    </table>

</body>
</html>
