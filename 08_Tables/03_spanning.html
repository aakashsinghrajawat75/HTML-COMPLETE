<!DOCTYPE html>
<html>
<head>
    <title>Spanning Rows and Columns</title>
    <style>table, th, td { border: 1px solid black; border-collapse: collapse; padding: 8px; text-align: center; }</style>
</head>
<body>
    <h1>Stretching Cells</h1>

    <h2>Colspan (Stretching Horizontally)</h2>
    <p>Use <b>colspan</b> to make a cell span across multiple columns.</p>
    <table>
        <tr>
            <th colspan="2">Aakash (CGPA: 9.0) Schedule</th>
        </tr>
        <tr>
            <td>Monday</td>
            <td>Tuesday</td>
        </tr>
    </table>

    <br>

    <h2>Rowspan (Stretching Vertically)</h2>
    <p>Use <b>rowspan</b> to make a cell stretch down multiple rows.</p>
    <table>
        <tr>
            <th rowspan="2">Kunal Contacts</th>
            <td>Phone: 555-1234</td>
        </tr>
        <tr>
            <td>Email: kunal@code.com</td>
        </tr>
    </table>

</body>
</html>
