<!DOCTYPE html>
<html>
<!-- THE HEAD SECTION -->
<!-- Everything between the <head> tags is meta-information. -->
<!-- Users browsing the web page will NOT see this content. -->
<head>
    <meta charset="UTF-8">
    <title>Understanding the Head Element</title>
</head>

<!-- THE BODY SECTION -->
<!-- Everything between the <body> tags is what the user actually sees. -->
<body>
    <h1>The Head vs. The Body</h1>
    <p>Notice how the title "Understanding the Head Element" appears in our browser's tab, but not on this white page itself?</p>
    <p>The <b>head</b> is for the browser and search engines. The <b>body</b> is for the human visitors!</p>
    
    <p><small>Created by Aakash.</small></p>
</body>
</html>
