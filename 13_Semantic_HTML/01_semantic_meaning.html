<!DOCTYPE html>
<html>
<head>
    <title>Semantic Meaning</title>
</head>
<body>
    <h1>Why Semantics Matter</h1>

    <h2>The Old Way (Non-Semantic)</h2>
    <!-- The browser has absolutely no idea what content lives inside these generic div tags -->
    <div id="website-header">Aakash's Blog</div>
    <div class="navigation">Home | About | Contact</div>

    <br><hr><br>

    <h2>The Modern Way (HTML5 Semantic)</h2>
    <!-- The browser knows exactly what these sections represent! -->
    <header>Aakash's Blog (Written by Aakash - CGPA 9.0)</header>
    <nav>Home | About | Contact</nav>

    <p>Khushi advises always using the Modern Way so search engines can read your site properly!</p>

</body>
</html>
