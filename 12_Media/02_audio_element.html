<!DOCTYPE html>
<html>
<head>
    <title>Audio Element</title>
</head>
<body>
    <h1>Embedding Sounds</h1>

    <p>Charv says: Audio tags work almost identically to video tags!</p>

    <!-- The audio element with controls enabled -->
    <audio controls>
        <!-- Similar to video, we point the source at the file -->
        <source src="dummy_audio.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

</body>
</html>
