<!DOCTYPE html>
<html>

<head>
    <title>Iframe Element</title>
</head>

<body>
    <h1>Inline Frames (Iframes)</h1>

    <p>Kunal added this neat feature! An iframe cuts a window into your webpage that allows you to see a completely
        different website inside of it.</p>

    <!-- Embedding a standard placeholder iframe -->
    <!-- For security reasons, many websites block themselves from being put inside iframes, but services like YouTube provide specific iframe links for embedding! -->
    <iframe src="https://www.youtube.com/" width="600" height="400" title="A window into example.com"></iframe>

</body>

</html>
