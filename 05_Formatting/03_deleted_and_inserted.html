<!DOCTYPE html>
<html>
<head>
    <title>Deleted and Inserted Text</title>
</head>
<body>
    <h1>Document Revisions</h1>

    <p>When tracking changes in a document, you can show exactly what was removed and what was added.</p>

    <!-- The <del> tag represents deleted text (strikethrough) -->
    <!-- The <ins> tag represents inserted text (underline) -->
    <p>Aakash's favorite programming language is <del>Python</del> <ins>HTML</ins>!</p>

    <p>Jay originally scheduled the meeting for <del>Monday</del>, but moved it to <ins>Wednesday</ins>.</p>

</body>
</html>
